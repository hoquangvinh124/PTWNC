<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">
            <i class="bi bi-pencil-square"></i> 
            {{ isEditMode() ? 'Edit Fashion' : 'Create New Fashion' }}
          </h3>
        </div>
        <div class="card-body">
          @if (error()) {
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
              <i class="bi bi-exclamation-triangle-fill"></i> {{ error() }}
              <button type="button" class="btn-close" (click)="error.set('')"></button>
            </div>
          }

          <form #fashionForm="ngForm" (ngSubmit)="onSubmit()">
            <!-- Title -->
            <div class="mb-3">
              <label for="title" class="form-label">
                Fashion Title <span class="text-danger">*</span>
              </label>
              <input 
                type="text" 
                class="form-control" 
                id="title"
                name="title"
                [(ngModel)]="fashion.title"
                required
                placeholder="e.g., Summer Cotton T-Shirt">
            </div>

            <!-- Style -->
            <div class="mb-3">
              <label for="style" class="form-label">
                Style <span class="text-danger">*</span>
              </label>
              <select 
                class="form-select" 
                id="style"
                name="style"
                [(ngModel)]="fashion.style"
                required>
                @for (style of styles; track style) {
                  <option [value]="style">{{ style }}</option>
                }
              </select>
            </div>

            <!-- Thumbnail URL -->
            <div class="mb-3">
              <label for="thumbnail" class="form-label">
                Thumbnail URL <span class="text-danger">*</span>
              </label>
              <input 
                type="url" 
                class="form-control" 
                id="thumbnail"
                name="thumbnail"
                [(ngModel)]="fashion.thumbnail"
                required
                placeholder="https://example.com/image.jpg">
              <small class="form-text text-muted">
                Enter a valid image URL
              </small>
              
              <!-- Thumbnail Preview -->
              @if (fashion.thumbnail) {
                <div class="mt-3">
                  <img 
                    [src]="fashion.thumbnail" 
                    [alt]="fashion.title"
                    class="img-thumbnail"
                    style="max-width: 200px; max-height: 300px;"
                    (error)="onImageError($event)">
                </div>
              }
            </div>

            <!-- Details (HTML Editor) -->
            <div class="mb-4">
              <label for="details" class="form-label">
                Fashion Details (HTML) <span class="text-danger">*</span>
              </label>
              <textarea 
                class="form-control font-monospace" 
                id="details"
                name="details"
                [(ngModel)]="fashion.details"
                rows="12"
                required
                placeholder="Enter HTML content for fashion details...
                
Example:
<p>Comfortable and breathable cotton t-shirt.</p>
<ul>
  <li>100% Cotton</li>
  <li>Machine washable</li>
  <li>Available in multiple colors</li>
</ul>"></textarea>
              <small class="form-text text-muted">
                You can use HTML tags like &lt;p&gt;, &lt;ul&gt;, &lt;li&gt;, &lt;strong&gt;, etc. for formatting
              </small>
            </div>

            <!-- Preview Details -->
            <div class="mb-4">
              <label class="form-label">
                <i class="bi bi-eye"></i> Details Preview:
              </label>
              <div class="card">
                <div class="card-body" [innerHTML]="fashion.details"></div>
              </div>
            </div>

            <!-- Form Actions -->
            <div class="d-flex gap-2 justify-content-end mt-4 pt-3 border-top">
              <button 
                type="button" 
                class="btn btn-secondary"
                (click)="cancel()"
                [disabled]="loading()">
                <i class="bi bi-x-circle"></i> Cancel
              </button>
              <button 
                type="submit" 
                class="btn btn-primary"
                [disabled]="!fashionForm.form.valid || loading()">
                @if (loading()) {
                  <span class="spinner-border spinner-border-sm me-1"></span>
                }
                <i class="bi bi-check-circle"></i> {{ submitButtonText() }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
