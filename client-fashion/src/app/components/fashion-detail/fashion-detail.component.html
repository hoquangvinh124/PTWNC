<div class="container py-5">
  @if (loading()) {
    <div class="text-center my-5">
      <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3">Loading fashion details...</p>
    </div>
  } @else if (error()) {
    <div class="alert alert-danger">
      <i class="bi bi-exclamation-triangle-fill"></i> {{ error() }}
    </div>
    <div class="text-center">
      <button class="btn btn-primary" (click)="goBack()">
        <i class="bi bi-arrow-left"></i> Go Back
      </button>
    </div>
  } @else if (fashion()) {
    <div class="row">
      <!-- Back Button -->
      <div class="col-12 mb-3">
        <button class="btn btn-outline-secondary" (click)="goBack()">
          <i class="bi bi-arrow-left"></i> Back to Catalog
        </button>
      </div>

      <!-- Fashion Image -->
      <div class="col-md-6 mb-4">
        <div class="card shadow">
          <img 
            [src]="fashion()!.thumbnail" 
            [alt]="fashion()!.title"
            class="card-img fashion-detail-image"
            (error)="onImageError($event)">
        </div>
      </div>

      <!-- Fashion Details -->
      <div class="col-md-6">
        <div class="card shadow h-100">
          <div class="card-body">
            <div class="mb-3">
              <span class="badge" [ngClass]="getStyleBadgeClass(fashion()!.style)">
                {{ fashion()!.style }}
              </span>
            </div>

            <h1 class="card-title mb-4">{{ fashion()!.title }}</h1>

            <div class="mb-4">
              <h5 class="text-muted mb-2">
                <i class="bi bi-calendar-event"></i> Created on
              </h5>
              <p>{{ fashion()!.creationDate | date:'fullDate' }}</p>
            </div>

            <div class="mb-4">
              <h5 class="text-muted mb-2">
                <i class="bi bi-info-circle"></i> Details
              </h5>
              <div class="fashion-details-content" [innerHTML]="fashion()!.details"></div>
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-lg btn-primary" (click)="goBack()">
                <i class="bi bi-arrow-left-circle"></i> Back to Catalog
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  } @else {
    <div class="alert alert-warning">
      <i class="bi bi-exclamation-circle"></i> No fashion data available.
    </div>
  }
</div>
