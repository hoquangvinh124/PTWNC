<p>book-detail works!</p>
<p>{{errMessage}}</p>
Book Id: <input type="text" #bookId> <button (click)="searchBook(bookId.value)">Search</button>
<table>
    <tr>
        <td>Book Id:</td>
        <td>{{book?.BookId}}</td>
    </tr>
    <tr>
        <td>Book Name:</td>
        <td>{{book?.BookName}}</td>
    </tr>
    <tr>
        <td>Price:</td>
        <td>{{book?.Price}}</td>
    </tr>
    <tr>
        <td colspan="2">
            <img *ngIf="book?.Image" [src]="'/image/' + book.Image" alt="Book Image">
            <span *ngIf="!book?.Image">No Image</span>
        </td>
    </tr>
</table>
