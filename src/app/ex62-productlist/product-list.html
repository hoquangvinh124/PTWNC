<div class="container mt-4">
    <h2>Products</h2>
    <div *ngIf="message" class="alert alert-success">{{ message }}</div>
    <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let product of products">
            <div class="card h-100">
                <img [src]="product.image" class="card-img-top" [alt]="product.name"
                    style="height: 250px; object-fit: cover;">
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title">{{ product.name }}</h6>
                    <p class="text-muted mb-1" style="font-size: 0.85rem;">SKU: {{ product.sku }}</p>
                    <p class="fw-bold">${{ product.price.toFixed(2) }}</p>
                    <div class="mt-auto">
                        <button class="btn btn-info text-white" (click)="addToCart(product)">ADD TO CART</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <a routerLink="/cart" class="btn btn-secondary mt-3">View Shopping Cart</a>
</div>
