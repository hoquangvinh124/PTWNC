<div class="container mt-4" style="max-width: 640px;">
    <h3>📖 Thêm Sách Mới</h3>
    <form (ngSubmit)="submit()" #f="ngForm" class="mt-3">
        <div class="mb-3">
            <label class="form-label">Tiêu Đề</label>
            <input type="text" class="form-control" [(ngModel)]="book.Title" name="Title" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Tác Giả</label>
            <input type="text" class="form-control" [(ngModel)]="book.Author" name="Author" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Giá (VNĐ)</label>
            <input type="number" class="form-control" [(ngModel)]="book.Price" name="Price" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Ảnh Bìa</label>
            <select class="form-select" [(ngModel)]="book.Image" name="Image">
                <option *ngFor="let opt of imageOptions" [value]="opt.value">{{ opt.label }}</option>
            </select>
            <div class="mt-2">
                <img [src]="book.Image" alt="Preview" width="80" height="110" class="img-thumbnail"
                    style="object-fit: cover;" />
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Mô Tả</label>
            <textarea class="form-control" [(ngModel)]="book.Description" name="Description" rows="3"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success" [disabled]="!f.valid">Lưu</button>
            <button type="button" class="btn btn-secondary" (click)="cancel()">Hủy</button>
        </div>
    </form>
</div>
