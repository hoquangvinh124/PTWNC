<p>book-delete works!</p>
<p style="color: red;">{{errMessage}}</p>
<p style="color: green;">{{successMessage}}</p>
Book Id: <input type="text" #bookId> <button (click)="deleteBook(bookId.value); bookId.value = ''">Delete Book</button>
<table border="1">
  <tr>
    <td>BookId</td>
    <td>BookName</td>
    <td>Price</td>
    <td>Image</td>
  </tr>
  <tbody>
    <tr *ngFor="let book of books">
      <td>{{book.BookId}}</td>
      <td>{{book.BookName}}</td>
      <td>{{book.Price}}</td>
      <td>
        <img *ngIf="book.Image" [src]="'/image/' + book.Image" width="50px" height="50px" alt="Book Image">
        <span *ngIf="!book.Image">No Image</span>
      </td>
    </tr>
  </tbody>
</table>
