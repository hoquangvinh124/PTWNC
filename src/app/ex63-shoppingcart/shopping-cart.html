<div class="container mt-4">
    <h2 class="text-center mb-4">Shopping cart</h2>
    <div *ngIf="message" class="alert alert-success">{{ message }}</div>

    <div *ngIf="cart.length === 0" class="text-center text-muted py-4">
        Your cart is empty. <a routerLink="/product-list">Start shopping!</a>
    </div>

    <table class="table table-bordered" *ngIf="cart.length > 0">
        <thead class="table-light">
            <tr>
                <th>Remove</th>
                <th>SKU</th>
                <th>Image</th>
                <th>Product(s)</th>
                <th>Price</th>
                <th>Qty.</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of cart">
                <td class="text-center align-middle">
                    <input type="checkbox" [(ngModel)]="item.selected">
                </td>
                <td class="align-middle">{{ item.sku }}</td>
                <td class="align-middle">
                    <img [src]="item.image" [alt]="item.name" style="width: 80px; height: 60px; object-fit: cover;">
                </td>
                <td class="align-middle">{{ item.name }}</td>
                <td class="align-middle">${{ item.price.toFixed(2) }}</td>
                <td class="align-middle" style="width: 80px;">
                    <input type="number" class="form-control form-control-sm" [(ngModel)]="item.quantity" min="1">
                </td>
                <td class="align-middle">${{ getTotal(item).toFixed(2) }}</td>
            </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-end gap-2 mt-3" *ngIf="cart.length > 0">
        <button class="btn btn-danger" (click)="removeSelected()">Remove Selected</button>
        <button class="btn btn-info text-white" (click)="updateCart()">Update shopping cart</button>
        <a routerLink="/product-list" class="btn btn-secondary">Continue shopping</a>
    </div>
</div>
