<p>fashion-detail works!</p>

<div>
  Fashion ID: <input type="text" [(ngModel)]="fashionId"> <button (click)="searchFashion()">Search</button>
</div>

<table *ngIf="fashion">
  <tr>
    <td>Fashion Id:</td>
    <td>{{ fashion._id }}</td>
  </tr>
  <tr>
    <td>Fashion Subject:</td>
    <td>{{ fashion.fashion_subject }}</td>
  </tr>
  <tr>
    <td>Fashion Detail:</td>
    <td>{{ fashion.fashion_detail }}</td>
  </tr>
  <tr>
    <td colspan="2">
      <img [src]="fashion.fashion_image" [alt]="fashion.fashion_subject" style="max-width: 250px;">
    </td>
  </tr>
</table>

<div class="error-container" *ngIf="errMessage">
  <p>{{ errMessage }}</p>
</div>
