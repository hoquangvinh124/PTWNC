<div class="container mt-4" style="max-width: 780px;">
    <h3>{{ isEdit ? '✏️ Sửa Fashion' : '➕ Thêm Fashion Mới' }}</h3>

    <div *ngIf="error" class="alert alert-danger mt-2">{{ error }}</div>

    <form (ngSubmit)="submit()" #f="ngForm" class="mt-3">
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label fw-bold">Tiêu Đề *</label>
                <input type="text" class="form-control" [(ngModel)]="fashion.title" name="title" required />
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">Style *</label>
                <select class="form-select" [(ngModel)]="fashion.style" name="style" required>
                    <option *ngFor="let s of styles" [value]="s">{{ s }}</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">Thumbnail URL</label>
                <input type="text" class="form-control" [(ngModel)]="fashion.thumbnail" name="thumbnail"
                    placeholder="https://..." />
                <div class="mt-2" *ngIf="fashion.thumbnail">
                    <img [src]="fashion.thumbnail" width="70" height="90" class="img-thumbnail"
                        style="object-fit:cover;" onerror="this.style.display='none'" />
                </div>
            </div>

            <div class="col-12">
                <label class="form-label fw-bold">Chi Tiết (WYSIWYG) *</label>
                <div class="NgxEditor__Wrapper border rounded">
                    <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"></ngx-editor-menu>
                    <ngx-editor [editor]="editor" [(ngModel)]="fashion.details" name="details"
                        [placeholder]="'Nhập nội dung chi tiết...'"></ngx-editor>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success" [disabled]="saving || !f.valid">
                <span *ngIf="saving" class="spinner-border spinner-border-sm me-1"></span>
                {{ isEdit ? 'Cập Nhật' : 'Tạo Mới' }}
            </button>
            <button type="button" class="btn btn-secondary" (click)="cancel()">Hủy</button>
        </div>
    </form>
</div>
